<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaulGPT – Your AI Legal Assistant for Indian Law</title>
  <meta name="description"
    content="SaulGPT is an AI-powered legal assistant for Indian law. Ask about FIR, bail, rental disputes, consumer rights, and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ==============================
       ROOT / THEME TOKENS
    ============================== */
    :root {
      --bg: #f0f4ff;
      --surface: #ffffff;
      --surface2: #f7f9ff;
      --border: #dde3f5;
      --text: #0f1a2e;
      --muted: #5c6882;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-glow: rgba(37, 99, 235, 0.18);
      --user-bg: #e8f0ff;
      --user-border: #bdd2fc;
      --ai-bg: #ffffff;
      --warn: #7c3a00;
      --warn-bg: #fff3e0;
      --danger: #b91c1c;
      --emergency: #dc2626;
      --emergency-bg: #fff0f0;
      --emergency-border: #fca5a5;
      --sidebar-w: 290px;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(15, 26, 46, 0.08);
      --shadow-lg: 0 12px 40px rgba(15, 26, 46, 0.14);
      --transition: 0.2s ease;
    }

    [data-theme="dark"] {
      --bg: #0c1120;
      --surface: #131c32;
      --surface2: #1a2540;
      --border: #263354;
      --text: #e8edf8;
      --muted: #7a8aaa;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --primary-glow: rgba(59, 130, 246, 0.2);
      --user-bg: #1a2e52;
      --user-border: #2d4a82;
      --ai-bg: #1a2540;
      --warn: #fbbf24;
      --warn-bg: #271c00;
      --danger: #f87171;
      --emergency: #ef4444;
      --emergency-bg: #1a0a0a;
      --emergency-border: #7f1d1d;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 16px;
      transition: background var(--transition), color var(--transition);
    }

    /* ==============================
       APP SHELL
    ============================== */
    .app {
      width: 100%;
      max-width: 1200px;
      height: calc(100vh - 32px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      overflow: hidden;
      transition: background var(--transition), border-color var(--transition);
    }

    /* ==============================
       SIDEBAR
    ============================== */
    .sidebar {
      display: flex;
      flex-direction: column;
      background: var(--surface2);
      border-right: 1px solid var(--border);
      overflow: hidden;
      transition: background var(--transition), border-color var(--transition);
    }

    .sidebar-header {
      padding: 20px 18px 14px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .brand-text {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }

    .brand-text span {
      color: var(--primary);
    }

    .subtitle {
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .new-chat-btn {
      margin: 14px 18px 0;
      width: calc(100% - 36px);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), transform 0.1s, box-shadow var(--transition);
      box-shadow: 0 2px 12px var(--primary-glow);
      font-family: inherit;
    }

    .new-chat-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 18px var(--primary-glow);
    }

    .new-chat-btn:active {
      transform: translateY(0);
    }

    .history-section {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
    }

    .history-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    #chatHistoryList {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .history-btn {
      width: 100%;
      text-align: left;
      padding: 9px 12px;
      border: 1px solid transparent;
      border-radius: 9px;
      background: transparent;
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background var(--transition), border-color var(--transition);
    }

    .history-btn:hover {
      background: var(--border);
    }

    .history-btn.active {
      background: var(--primary-glow);
      border-color: var(--primary);
      color: var(--primary);
      font-weight: 600;
    }

    .sidebar-footer {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ==============================
       MAIN CHAT PANEL
    ============================== */
    .main {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* TOPBAR */
    .topbar {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      flex-shrink: 0;
      transition: background var(--transition);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu-btn {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      font-family: inherit;
    }

    .topbar h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: background var(--transition), border-color var(--transition);
    }

    .icon-btn:hover {
      background: var(--border);
    }

    .export-btn {
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--surface2);
      color: var(--text);
      padding: 0 12px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background var(--transition), border-color var(--transition);
    }

    .export-btn:hover {
      background: var(--border);
    }

    #status {
      font-size: 0.82rem;
      color: var(--primary);
      font-weight: 500;
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ==============================
       EMERGENCY BANNER
    ============================== */
    #emergencyBanner {
      display: none;
      padding: 10px 20px;
      background: var(--emergency-bg);
      border-bottom: 1px solid var(--emergency-border);
      color: var(--emergency);
      font-size: 0.85rem;
      font-weight: 600;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      animation: slideDown 0.3s ease;
    }

    #emergencyBanner.visible {
      display: flex;
    }

    #emergencyBanner .helplines {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-left: 4px;
    }

    #emergencyBanner .helpline {
      background: var(--emergency-bg);
      border: 1px solid var(--emergency-border);
      border-radius: 6px;
      padding: 2px 8px;
      font-weight: 700;
      cursor: pointer;
    }

    #emergencyBanner .close-banner {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      font-family: inherit;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ==============================
       MESSAGES
    ============================== */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: background var(--transition);
    }

    .messages::-webkit-scrollbar {
      width: 5px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 8px;
    }

    .message {
      max-width: 82%;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px 16px;
      line-height: 1.6;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
      animation: fadeUp 0.25s ease;
      transition: background var(--transition), border-color var(--transition);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      margin-left: auto;
      background: var(--user-bg);
      border-color: var(--user-border);
      border-bottom-right-radius: 3px;
    }

    .message.assistant {
      background: var(--ai-bg);
      border-bottom-left-radius: 3px;
    }

    .message.notice {
      background: var(--warn-bg);
      border-color: #fcd34d;
      color: var(--warn);
    }

    .meta {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .meta-name {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ai-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      flex-shrink: 0;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary);
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.5;
      }

      30% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    /* References */
    .ref-toggle {
      width: 20px;
      height: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      border-radius: 50%;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background var(--transition);
    }

    .ref-toggle:hover {
      background: var(--border);
    }

    .ref-panel {
      display: none;
      margin-top: 10px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      font-size: 0.82rem;
      color: var(--muted);
    }

    .ref-panel.open {
      display: block;
    }

    .ref-panel ul {
      margin: 6px 0 0 16px;
      line-height: 1.6;
    }

    /* ==============================
       COMPOSER
    ============================== */
    .composer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      transition: background var(--transition);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .attach-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }

    .attach-btn:hover {
      background: var(--border);
      color: var(--text);
    }

    textarea {
      flex: 1;
      min-height: 52px;
      max-height: 160px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      font-size: 0.92rem;
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
    }

    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    textarea::placeholder {
      color: var(--muted);
    }

    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background var(--transition), transform 0.1s, box-shadow var(--transition);
      box-shadow: 0 2px 8px var(--primary-glow);
    }

    .send-btn:hover:not(:disabled) {
      background: var(--primary-dark);
      transform: scale(1.06);
    }

    .send-btn:active:not(:disabled) {
      transform: scale(0.96);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .composer-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    #attachStatus {
      font-size: 0.8rem;
      color: var(--muted);
    }

    #error {
      font-size: 0.82rem;
      color: var(--danger);
    }

    /* ==============================
       SIDEBAR OVERLAY (mobile)
    ============================== */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    /* ==============================
       MOBILE RESPONSIVE
    ============================== */
    @media (max-width: 768px) {
      body {
        padding: 0;
      }

      .app {
        grid-template-columns: 1fr;
        height: 100vh;
        border-radius: 0;
        border: none;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 280px;
        z-index: 20;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        box-shadow: var(--shadow-lg);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay.visible {
        display: block;
      }

      .menu-btn {
        display: flex;
      }

      .export-btn span {
        display: none;
      }

      .icon-btn.export-pdf,
      .icon-btn.export-docx {
        display: none;
      }
    }

    /* ==============================
       SCROLLBAR
    ============================== */
    .history-section::-webkit-scrollbar {
      width: 4px;
    }

    .history-section::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 8px;
    }
  </style>
</head>

<body>
  <!-- Mobile sidebar overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <div class="app">
    <!-- ====== SIDEBAR ====== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-icon">⚖️</div>
          <span class="brand-text">Saul<span>GPT</span></span>
        </div>
        <p class="subtitle">AI-powered legal assistant for Indian law. Get clear information, not advice.</p>
      </div>

      <button class="new-chat-btn" onclick="startNewChat()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        New Chat
      </button>

      <div class="history-section">
        <div class="history-label">Recent Chats</div>
        <div id="chatHistoryList"></div>
      </div>

      <div class="sidebar-footer">
        ⚠️ For general information only. Always consult a qualified lawyer for legal advice.
      </div>
    </aside>

    <!-- ====== MAIN PANEL ====== -->
    <main class="main">
      <!-- Topbar -->
      <div class="topbar">
        <div class="topbar-left">
          <button class="menu-btn" onclick="openSidebar()" aria-label="Open menu">☰</button>
          <h2>Legal Chat</h2>
        </div>
        <div class="topbar-right">
          <div id="status"></div>
          <button class="export-btn" onclick="exportLatestReport('pdf')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span>PDF</span>
          </button>
          <button class="export-btn" onclick="exportLatestReport('docx')">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span>DOCX</span>
          </button>
          <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="Toggle dark mode"
            aria-label="Toggle dark mode">🌙</button>
        </div>
      </div>

      <!-- Emergency Banner -->
      <div id="emergencyBanner">
        <span>🚨 Emergency?</span>
        <div class="helplines">
          <span class="helpline" title="Police">🚓 Police: 100</span>
          <span class="helpline" title="Women Helpline">👩 Women: 1091</span>
          <span class="helpline" title="Cyber Crime">💻 Cyber: 1930</span>
          <span class="helpline" title="Child Helpline">👶 Child: 1098</span>
          <span class="helpline" title="Legal Aid">⚖️ Legal Aid: 15100</span>
        </div>
        <button class="close-banner" onclick="dismissBanner()">✕</button>
      </div>

      <!-- Messages -->
      <div id="messages" class="messages"></div>

      <!-- Composer -->
      <div class="composer">
        <input id="docFiles" type="file" accept=".pdf,.docx,.txt" multiple style="display:none"
          onchange="handleFilePick(event)" />
        <div class="input-row">
          <button class="attach-btn" onclick="document.getElementById('docFiles').click()" title="Upload document"
            aria-label="Upload document">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path
                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48" />
            </svg>
          </button>
          <textarea id="input" placeholder="Describe your legal issue or ask any Indian law question… (Enter to send)"
            onkeydown="handleKey(event)" rows="1"></textarea>
          <button class="send-btn" id="send" onclick="sendMessage()" aria-label="Send">
            <svg viewBox="0 0 24 24">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
            </svg>
          </button>
        </div>
        <div class="composer-meta">
          <div id="attachStatus"></div>
          <div id="error"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    /* ======================================================
       API BASE DETECTION
    ====================================================== */
    function getApiBaseCandidates() {
      const bases = [];
      const add = v => { const n = String(v || '').trim().replace(/\/+$/, ''); if (n && !bases.includes(n)) bases.push(n); };
      if (window.SAULGPT_API_BASE_URL) add(window.SAULGPT_API_BASE_URL);
      if (window.location.protocol === 'file:') {
        add('http://127.0.0.1:8000'); add('http://localhost:8000');
      } else {
        add(window.location.origin);
        add(`${window.location.protocol}//127.0.0.1:8000`);
        add(`${window.location.protocol}//localhost:8000`);
      }
      return bases;
    }
    const API_BASE_CANDIDATES = getApiBaseCandidates();

    /* ======================================================
       STATE
    ====================================================== */
    let history = [];
    let savedChats = JSON.parse(localStorage.getItem('saulgpt_chats') || '[]');
    let currentChatId = null;
    let lastAssistantReply = '';
    let isDark = localStorage.getItem('saulgpt_theme') === 'dark';

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendEl = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const attachEl = document.getElementById('attachStatus');
    const bannerEl = document.getElementById('emergencyBanner');
    const themeBtn = document.getElementById('themeBtn');

    /* ======================================================
       THEME
    ====================================================== */
    function applyTheme() {
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      themeBtn.textContent = isDark ? '☀️' : '🌙';
      themeBtn.title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
    }
    function toggleTheme() {
      isDark = !isDark;
      localStorage.setItem('saulgpt_theme', isDark ? 'dark' : 'light');
      applyTheme();
    }
    applyTheme();

    /* ======================================================
       SIDEBAR (mobile)
    ====================================================== */
    function openSidebar() {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('sidebarOverlay').classList.add('visible');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('visible');
    }

    /* ======================================================
       EMERGENCY DETECTION
    ====================================================== */
    const EMERGENCY_KEYWORDS = [
      'arrested', 'arrest me', 'being arrested', 'police arrested',
      'kidnapped', 'kidnapping', 'missing', 'abducted',
      'domestic violence', 'beaten', 'being beaten', 'physically abused',
      'raped', 'sexual assault', 'molested',
      'threatened to kill', 'death threat', 'threatening me',
      'suicide', 'want to die',
    ];
    function checkEmergency(text) {
      const lower = text.toLowerCase();
      return EMERGENCY_KEYWORDS.some(kw => lower.includes(kw));
    }
    function showBanner() { bannerEl.classList.add('visible'); }
    function dismissBanner() { bannerEl.classList.remove('visible'); }

    /* ======================================================
       CHAT HISTORY
    ====================================================== */
    function generateId() { return 'chat_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now(); }

    function saveCurrentChat() {
      if (history.length === 0) return;
      const title = (history.find(m => m.role === 'user')?.content || 'Chat').substring(0, 36) + '…';
      const idx = savedChats.findIndex(c => c.id === currentChatId);
      if (idx >= 0) {
        savedChats[idx] = { ...savedChats[idx], title, history: [...history], html: messagesEl.innerHTML };
      } else {
        if (!currentChatId) currentChatId = generateId();
        savedChats.unshift({ id: currentChatId, title, history: [...history], html: messagesEl.innerHTML, ts: Date.now() });
      }
      localStorage.setItem('saulgpt_chats', JSON.stringify(savedChats));
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('chatHistoryList');
      list.innerHTML = '';
      savedChats.forEach(chat => {
        const btn = document.createElement('button');
        btn.className = 'history-btn' + (chat.id === currentChatId ? ' active' : '');
        btn.textContent = '💬 ' + chat.title;
        btn.onclick = () => { loadChat(chat.id); closeSidebar(); };
        list.appendChild(btn);
      });
    }

    function loadChat(chatId) {
      const chat = savedChats.find(c => c.id === chatId);
      if (!chat) return;
      currentChatId = chatId;
      history = [...chat.history];
      messagesEl.innerHTML = chat.html;
      messagesEl.scrollTop = messagesEl.scrollHeight;
      renderHistory();
    }

    function startNewChat() {
      currentChatId = generateId();
      history = [];
      lastAssistantReply = '';
      messagesEl.innerHTML = '';
      errorEl.textContent = '';
      attachEl.textContent = '';
      dismissBanner();
      addMessage('assistant', "I'm SaulGPT — your AI guide for Indian law. Tell me about your legal situation and I'll help you understand your legal category, general context, and next steps.");
      renderHistory();
      closeSidebar();
    }

    /* ======================================================
       MESSAGES
    ====================================================== */
    function addMessage(role, content, mode = 'normal') {
      const wrap = document.createElement('div');
      wrap.className = `message ${role}${mode === 'notice' ? ' notice' : ''}`;

      const meta = document.createElement('div');
      meta.className = 'meta';
      const nameEl = document.createElement('div');
      nameEl.className = 'meta-name';
      if (role === 'assistant') {
        const dot = document.createElement('span');
        dot.className = 'ai-dot';
        nameEl.appendChild(dot);
      }
      nameEl.appendChild(document.createTextNode(role === 'user' ? 'You' : 'SaulGPT'));
      meta.appendChild(nameEl);

      const body = document.createElement('div');
      body.textContent = content;

      wrap.appendChild(meta);
      wrap.appendChild(body);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      if (role === 'assistant' && mode !== 'notice') lastAssistantReply = content;
      return wrap;
    }

    function addTypingIndicator() {
      const wrap = document.createElement('div');
      wrap.className = 'message assistant';
      wrap.id = 'typing-indicator';
      const meta = document.createElement('div');
      meta.className = 'meta';
      const nameEl = document.createElement('div');
      nameEl.className = 'meta-name';
      const dot = document.createElement('span');
      dot.className = 'ai-dot';
      nameEl.appendChild(dot);
      nameEl.appendChild(document.createTextNode('SaulGPT'));
      meta.appendChild(nameEl);
      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.innerHTML = '<span></span><span></span><span></span>';
      wrap.appendChild(meta);
      wrap.appendChild(indicator);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrap;
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function attachReferences(msgEl, citations) {
      if (!Array.isArray(citations) || !citations.length) return;
      const meta = msgEl.querySelector('.meta');
      if (!meta) return;
      const toggle = document.createElement('button');
      toggle.className = 'ref-toggle';
      toggle.textContent = 'i';
      toggle.title = 'Show references';
      toggle.setAttribute('aria-expanded', 'false');
      const panel = document.createElement('div');
      panel.className = 'ref-panel';
      panel.innerHTML = '<strong style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted)">References</strong><ul>' +
        citations.map(c => `<li>${String(c.kind || '').toUpperCase()} · ${c.section || 'Ref'} · ${c.source || 'Unknown'}${c.score ? ` · score: ${Number(c.score).toFixed(2)}` : ''}</li>`).join('') + '</ul>';
      toggle.addEventListener('click', () => {
        const open = panel.classList.toggle('open');
        toggle.setAttribute('aria-expanded', String(open));
        toggle.textContent = open ? '×' : 'i';
      });
      meta.appendChild(toggle);
      msgEl.appendChild(panel);
    }

    /* ======================================================
       LOADING STATE
    ====================================================== */
    function setLoading(on) {
      sendEl.disabled = on;
      inputEl.disabled = on;
      if (!on) {
        statusEl.innerHTML = '';
        removeTypingIndicator();
      } else {
        statusEl.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" opacity=".3"/><path d="M21 12a9 9 0 0 0-9-9"/></svg> Analyzing…';
      }
    }

    /* ======================================================
       API HELPERS
    ====================================================== */
    async function fetchWithFallback(paths, options) {
      let lastErr;
      for (const base of API_BASE_CANDIDATES) {
        for (const path of paths) {
          try {
            const r = await fetch(`${base}${path}`, options);
            if (r.status !== 404) return r;
          } catch (e) { lastErr = e; }
        }
      }
      if (lastErr) throw lastErr;
      throw new Error('No compatible endpoint found.');
    }

    async function extractErrMsg(res) {
      try { const d = await res.json(); return d?.detail || d?.message || `Error ${res.status}`; } catch (_) { }
      try { return (await res.text()).slice(0, 200); } catch (_) { }
      return `Request failed (${res.status})`;
    }

    function parseStreamText(raw) {
      if (!raw) return '';
      let out = '';
      for (const line0 of String(raw).split('\n')) {
        const line = line0.trim();
        if (!line) continue;
        if (line.startsWith('0:')) { try { out += JSON.parse(line.slice(2).trim()); } catch (_) { out += line.slice(2).trim(); } continue; }
        if (line.startsWith('data:')) {
          const d = line.slice(5).trim();
          if (!d || d === '[DONE]') continue;
          try { const p = JSON.parse(d); out += typeof p === 'string' ? p : (p?.text || p?.delta || ''); } catch (_) { out += d; }
        }
      }
      return out.trim() || String(raw).replace(/^data:\s*/gm, '').replace(/\[DONE\]/g, '').trim();
    }

    function friendlyErr(msg) {
      const l = String(msg || '').toLowerCase();
      if (l.includes('failed to fetch') || l.includes('networkerror') || l.includes('network error') || l.includes('load failed'))
        return 'I could not connect to the backend service right now. Please make sure the FastAPI server is running, then try again.';
      return msg && msg.trim() ? String(msg) : 'I could not process that request. Please rephrase your question.';
    }

    /* ======================================================
       SEND MESSAGE
    ====================================================== */
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      errorEl.textContent = '';
      if (message.length < 2) { errorEl.textContent = 'Please enter a longer message.'; return; }

      if (!currentChatId) currentChatId = generateId();

      addMessage('user', message);
      history.push({ role: 'user', content: message });
      inputEl.value = '';
      setLoading(true);
      addTypingIndicator();

      // Emergency detection
      if (checkEmergency(message)) showBanner();

      try {
        const res = await fetchWithFallback(['/chat', '/api/chat'], {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, history: history.slice(-20) })
        });
        if (!res.ok) throw new Error(await extractErrMsg(res));

        const ct = res.headers.get('content-type') || '';
        let data;
        if (ct.includes('application/json')) {
          data = await res.json();
        } else {
          const raw = await res.text();
          data = { reply: parseStreamText(raw) || 'No response.', citations: [], redirected_to_law: false };
        }

        removeTypingIndicator();
        const msgEl = addMessage('assistant', data.reply, data.redirected_to_law ? 'notice' : 'normal');
        history.push({ role: 'assistant', content: data.reply });
        attachReferences(msgEl, data.citations || []);
        saveCurrentChat();
      } catch (err) {
        removeTypingIndicator();
        addMessage('assistant', friendlyErr(err?.message), 'notice');
      } finally {
        setLoading(false);
      }
    }

    /* ======================================================
       FILE UPLOAD
    ====================================================== */
    async function handleFilePick(e) {
      const files = e.target.files;
      if (!files || !files.length) return;
      await uploadDocuments(files);
      e.target.value = '';
    }

    async function uploadDocuments(files) {
      errorEl.textContent = '';
      attachEl.textContent = `Uploading ${files.length} file(s)…`;
      const form = new FormData();
      for (const f of files) form.append('files', f);
      try {
        const res = await fetchWithFallback(['/api/documents/ingest', '/documents/ingest'], { method: 'POST', body: form });
        if (!res.ok) throw new Error(await extractErrMsg(res));
        const d = await res.json();
        attachEl.textContent = `Indexed ${d.ingested_files || 0} file(s), ${d.total_chunks || 0} chunk(s).${d.failed_files ? ` Failed: ${d.failed_files}.` : ''}`;
        addMessage('assistant', `Indexed ${d.ingested_files || 0} uploaded document(s). You can now ask questions using those facts.`);
      } catch (err) {
        attachEl.textContent = '';
        errorEl.textContent = friendlyErr(err?.message);
      }
    }

    /* ======================================================
       EXPORT
    ====================================================== */
    function parseDispositionFilename(h) {
      if (!h) return null;
      const utf8 = h.match(/filename\*=UTF-8''([^;]+)/i);
      if (utf8) return decodeURIComponent(utf8[1]).replace(/['"]/g, '');
      const basic = h.match(/filename="?([^"]+)"?/i);
      return basic ? basic[1] : null;
    }

    async function exportLatestReport(format) {
      errorEl.textContent = '';
      if (!lastAssistantReply.trim()) { errorEl.textContent = 'No assistant report available to export yet.'; return; }
      try {
        const res = await fetchWithFallback(['/api/reports/export', '/reports/export'], {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: 'SaulGPT Legal Report', content: lastAssistantReply, format })
        });
        if (!res.ok) { const p = await res.json().catch(() => { }); throw new Error(p?.detail || 'Export failed.'); }
        const blob = await res.blob();
        const fn = parseDispositionFilename(res.headers.get('content-disposition')) || `saulgpt-report.${format}`;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = fn; document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      } catch (err) { errorEl.textContent = friendlyErr(err?.message); }
    }

    /* ======================================================
       INIT
    ====================================================== */
    if (savedChats.length > 0) {
      renderHistory();
      loadChat(savedChats[0].id);
    } else {
      startNewChat();
    }
  </script>
</body>

</html>
